```js
const { default: makeWASocket, useMultiFileAuthState, DisconnectReason, Browsers } = require('@whiskeysockets/baileys')
const pino = require('pino')
const fs = require('fs')

async function pair() {
    const { state, saveCreds } = await useMultiFileAuthState('./session')
    
    const sock = makeWASocket({
        auth: state,
        printQRInTerminal: false,
        logger: pino({ level: 'silent' }),
        browser: Browsers.macOS('Desktop')
    })

    if (!sock.authState.creds.registered) {
        const phoneNumber = process.env.PHONE_NUMBER.replace(/[^0-9]/g, '')
        if (!phoneNumber) {
            console.log('❌ ERROR: No phone number provided')
            process.exit(1)
        }
        
        console.log(`Requesting pairing code for ${phoneNumber}...`)
        await new Promise(resolve => setTimeout(resolve, 2000))
        const code = await sock.requestPairingCode(phoneNumber)
        console.log('')
        console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━')
        console.log(`📱 PAIRING CODE: ${code}`)
        console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━')
        console.log('1. Open WhatsApp > Linked Devices')
        console.log('2. Tap "Link with phone number instead"')
        console.log('3. Enter the code above')
        console.log('')
    }

    sock.ev.on('creds.update', saveCreds)
    
    sock.ev.on('connection.update', async (update) => {
        const { connection, lastDisconnect } = update
        if (connection === 'open') {
            console.log('✅ PAIRED SUCCESSFULLY!')
            console.log('')
            console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━')
            console.log('📋 YOUR SESSION_ID:')
            console.log(JSON.stringify(fs.readFileSync('./session/creds.json').toString()))
            console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━')
            console.log('Copy the entire long string above. This is your SESSION_ID')
            console.log('Paste it in Heroku/Render/Railway env vars as SESSION_ID')
            await new Promise(resolve => setTimeout(resolve, 3000))
            process.exit(0)
        }
        if (connection === 'close') {
            const shouldReconnect = lastDisconnect?.error?.output?.statusCode !== DisconnectReason.loggedOut
            if (shouldReconnect) {
                console.log('Reconnecting...')
                pair()
            } else {
                console.log('❌ Connection closed. Delete session folder and retry.')
                process.exit(1)
            }
        }
    })
}

pair().catch(err => {
    console.error('❌ Error:', err)
    process.exit(1)
})
