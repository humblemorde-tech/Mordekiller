```yaml
name: Pair WhatsApp

on:
  workflow_dispatch:
    inputs:
      phone_number:
        description: 'Your WhatsApp number with country code. Example: 254731070008'
        required: true
        default: '254'

jobs:
  check-fork:
    runs-on: ubuntu-latest
    steps:
      - name: Verify user forked the repo
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Owner: ${{ github.repository_owner }}"
          if [ "${{ github.repository_owner }}" == "humblemorde-tech" ]; then
            echo ""
            echo "❌ ERROR: YOU MUST FORK THIS REPO FIRST!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "1. Click 'Fork' button at the top-right of this page"
            echo "2. Go to YOUR forked repo > Actions tab"
            echo "3. Run 'Pair WhatsApp' from YOUR fork"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Why? SESSION_ID is tied to your GitHub account."
            echo "Running from humblemorde-tech/morde-killer-bot won't work for you."
            exit 1
          fi
          echo "✅ Running from fork: ${{ github.repository }}. Proceeding..."

  pair:
    needs: check-fork
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Start Pairing Process
        run: node pair.js
        env:
          PHONE_NUMBER: ${{ github.event.inputs.phone_number }}

      - name: Upload Session Backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: session-backup
          path: session/
          retention-days: 1
```
